<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Krishan Music | Ultimate V4 (Anti-Ban)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ================= THEME VARIABLES ================= */
        :root {
            --primary: #1db954;
            --primary-dark: #1aa34a;
            --bg-main: #121212;
            --bg-panel: #181818;
            --bg-card-hover: #282828;
            --text-white: #ffffff;
            --text-sub: #b3b3b3;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-main); color: var(--text-white); min-height: 100vh; padding-bottom: 120px; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        /* ================= NAVBAR ================= */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; position: sticky; top: 0; z-index: 100;
            background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--primary); font-size: 28px; }
        .badge { font-size: 10px; background: var(--primary); color: black; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 8px; font-weight: 700; }

        /* ================= HERO SECTION ================= */
        .hero { padding: 40px 30px; }
        .greeting { font-size: 32px; font-weight: 700; margin-bottom: 20px; }

        .search-container { position: relative; max-width: 500px; }
        .search-container i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-sub); }
        .search-input {
            width: 100%; padding: 16px 20px 16px 50px; border-radius: 30px; border: none;
            background: var(--bg-panel); color: var(--text-white); font-size: 16px; outline: none;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .search-input:focus { background: var(--bg-card-hover); box-shadow: 0 4px 20px rgba(29, 185, 84, 0.3); }

        /* ================= GRID & CARDS ================= */
        main { padding: 0 30px; }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }

        .card {
            background: var(--bg-panel); padding: 15px; border-radius: 12px; cursor: pointer;
            transition: all 0.3s ease; position: relative;
        }
        .card:hover { background: var(--bg-card-hover); transform: translateY(-5px); }
        .card-img-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .card:hover img { transform: scale(1.05); }
        
        .play-overlay-btn {
            position: absolute; bottom: 10px; right: 10px; width: 45px; height: 45px;
            background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: black; opacity: 0; transform: translateY(20px); transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .card:hover .play-overlay-btn { opacity: 1; transform: translateY(0); }
        .play-overlay-btn:hover { background: var(--primary-dark); transform: scale(1.1); }

        .card-title { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
        .card-artist { font-size: 13px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ================= SKELETON LOADING ================= */
        .skeleton { background: linear-gradient(90deg, var(--bg-panel) 25%, var(--bg-card-hover) 50%, var(--bg-panel) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .sk-card { background: var(--bg-panel); padding: 15px; border-radius: 12px; }
        .sk-img { width: 100%; aspect-ratio: 1/1; margin-bottom: 12px; }
        .sk-text { height: 15px; margin-bottom: 8px; }
        .sk-text-sm { height: 12px; width: 70%; }

        /* ================= BOTTOM PLAYER ================= */
        .player-container {
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000;
            transform: translateY(120%); transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
        }
        .player-container.active { transform: translateY(0); }
        
        .player {
            background: rgba(24, 24, 24, 0.95); backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .player-track { display: flex; align-items: center; gap: 15px; width: 30%; min-width: 180px; }
        .player-thumb { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; }
        .track-info-text .p-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .track-info-text .p-status { font-size: 11px; color: var(--primary); font-weight: 600; }

        .player-controls { display: flex; flex-direction: column; align-items: center; width: 40%; }
        .buttons { display: flex; align-items: center; gap: 25px; margin-bottom: 10px; }
        .btn-control { color: var(--text-sub); font-size: 18px; cursor: pointer; transition: color 0.2s; }
        .btn-control:hover { color: white; }
        .btn-play { font-size: 36px; color: white; transition: transform 0.2s; cursor: pointer; }
        .btn-play:hover { transform: scale(1.1); color: var(--primary); }

        .progress-wrapper { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-sub); }
        .progress-bar { flex: 1; height: 4px; background: #404040; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 2px; transition: width 0.1s linear; pointer-events: none;}
        .progress-bar:hover .progress-fill { background: var(--primary-dark); }

        .volume-controls { width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 10px; color: var(--text-sub); }
        .vol-bar { width: 100px; height: 4px; background: #404040; border-radius: 2px; cursor: pointer; }
        .vol-fill { width: 100%; height: 100%; background: white; border-radius: 2px; pointer-events: none;}

        /* ================= TOAST NOTIFICATIONS ================= */
        #toast-container { position: fixed; top: 80px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(10px); color: white; padding: 12px 20px; border-radius: 8px;
            border-left: 4px solid var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-size: 13px; font-weight: 600; animation: slideInRight 0.3s ease forwards; display: flex; align-items: center; gap: 10px;
        }
        .toast.error { border-left-color: #ff3e3e; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .hero { padding: 30px 20px; } .greeting { font-size: 24px; }
            main { padding: 0 20px; } .grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .player { padding: 10px 15px; } .player-thumb { width: 50px; height: 50px; }
            .volume-controls { display: none; } .player-track { width: 60%; } .player-controls { width: 40%; }
            .progress-wrapper { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <i class="fab fa-spotify"></i> Krishan Music <span class="badge">V4 PRO</span>
        </div>
    </nav>

    <div class="hero">
        <h1 class="greeting" id="greetingText">Welcome Back!</h1>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="What do you want to listen to?" onkeypress="handleKeyPress(event)">
        </div>
    </div>

    <main>
        <h2 class="section-title" id="resultsTitle">Made For Krishan</h2>
        <div class="grid" id="resultsGrid"></div>
    </main>

    <div id="toast-container"></div>

    <div id="ytPlayerContainer" style="display:none; position:absolute; width:0; height:0;"></div>

    <div class="player-container" id="playerContainer">
        <div class="player">
            <div class="player-track">
                <img id="pThumb" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=100&auto=format&fit=crop" alt="" class="player-thumb">
                <div class="track-info-text">
                    <div class="p-title" id="pTitle">Nothing Playing</div>
                    <div class="p-status" id="pStatus">Select a song</div>
                </div>
            </div>
            <div class="player-controls">
                <div class="buttons">
                    <i class="fas fa-step-backward btn-control" onclick="showToast('Previous not supported yet')"></i>
                    <i class="fas fa-play-circle btn-play" id="playPauseBtn" onclick="togglePlay()"></i>
                    <i class="fas fa-step-forward btn-control" onclick="showToast('Next not supported yet')"></i>
                </div>
                <div class="progress-wrapper">
                    <span id="currTime">0:00</span>
                    <div class="progress-bar" id="progBar" onclick="seek(event)">
                        <div class="progress-fill" id="progFill"></div>
                    </div>
                    <span id="durTime">0:00</span>
                </div>
            </div>
            <div class="volume-controls">
                <i class="fas fa-volume-up"></i>
                <div class="vol-bar" onclick="setVolume(event)">
                    <div class="vol-fill" id="volFill"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // 🔥🔥🔥 YAHAN APNA RENDER URL DALO 🔥🔥🔥
        const BASE_URL = "https://ytmusicapi-krishan.onrender.com"; // <-- Example URL

        // Elements
        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        const resultsTitle = document.getElementById('resultsTitle');
        const playerContainer = document.getElementById('playerContainer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const pStatus = document.getElementById('pStatus');

        // YOUTUBE PLAYER LOGIC
        let ytPlayer;
        let progressInterval;

        // Ye function YouTube API automatically call karta hai jab wo load ho jata hai
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('ytPlayerContainer', {
                height: '0', width: '0',
                playerVars: { 'autoplay': 1, 'controls': 0, 'playsinline': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                updatePlayerStatus("Now Playing", "var(--primary)", false);
                playPauseBtn.className = 'fas fa-pause-circle btn-play';
                startProgressBar();
            } else if (event.data == YT.PlayerState.BUFFERING) {
                updatePlayerStatus("Buffering...", "var(--primary)", true);
            } else if (event.data == YT.PlayerState.PAUSED) {
                playPauseBtn.className = 'fas fa-play-circle btn-play';
            } else if (event.data == YT.PlayerState.ENDED) {
                playPauseBtn.className = 'fas fa-play-circle btn-play';
                document.getElementById('progFill').style.width = '0%';
                clearInterval(progressInterval);
            }
        }

        // Init App
        window.onload = () => {
            setGreeting();
            fetchAndRender('Kishore Kumar', 'Quick Picks');
            searchInput.value = '';

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                    e.preventDefault(); togglePlay();
                }
            });
        }

        function setGreeting() {
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Good Morning' : hour < 18 ? 'Good Afternoon' : 'Good Evening';
            document.getElementById('greetingText').innerText = `${greeting}, Krishan`;
        }

        function handleKeyPress(e) { if (e.key === 'Enter') triggerSearch(); }
        function triggerSearch() {
            const query = searchInput.value.trim();
            if (query) fetchAndRender(query, `Search results for "${query}"`);
        }

        function showSkeletons() {
            resultsGrid.innerHTML = Array(10).fill('').map(() => `
                <div class="sk-card">
                    <div class="skeleton sk-img"></div>
                    <div class="skeleton sk-text"></div>
                    <div class="skeleton sk-text sk-text-sm"></div>
                </div>
            `).join('');
        }

        // Search fetching from Your Backend
        async function fetchAndRender(query, titleText) {
            resultsTitle.innerText = titleText;
            showSkeletons();
            try {
                if(BASE_URL === "YOUR_RENDER_URL_HERE") { throw new Error("API URL set nahi kiya hai!"); }
                const res = await fetch(`${BASE_URL}/search?query=${encodeURIComponent(query)}&filter=songs`);
                const data = await res.json();
                resultsGrid.innerHTML = ''; 

                if (data.status === 'success' && data.data.length > 0) {
                    data.data.forEach(song => {
                        const thumb = song.thumbnails[song.thumbnails.length - 1]?.url;
                        const artist = song.artists?.[0]?.name || "Unknown";
                        const safeTitle = song.title.replace(/'/g, "\\'"); 
                        
                        resultsGrid.innerHTML += `
                            <div class="card" onclick="playSong('${song.videoId}', '${safeTitle}', '${thumb}', '${artist}')">
                                <div class="card-img-wrapper">
                                    <img src="${thumb}" loading="lazy" alt="${song.title}">
                                    <div class="play-overlay-btn"><i class="fas fa-play"></i></div>
                                </div>
                                <div class="card-title">${song.title}</div>
                                <div class="card-artist">${artist}</div>
                            </div>
                        `;
                    });
                } else {
                    resultsGrid.innerHTML = '<p style="color:var(--text-sub)">Kuch nahi mila yaar...</p>';
                }
            } catch (err) {
                resultsGrid.innerHTML = '<p style="color:#ff3e3e">Server connect nahi ho raha.</p>';
                showToast(err.message, true);
            }
        }

        // Direct YouTube API Playback (No backend stream needed!)
        function playSong(videoId, title, thumb, artist) {
            playerContainer.classList.add('active');
            document.getElementById('pTitle').innerText = title;
            document.getElementById('pThumb').src = thumb;
            updatePlayerStatus("Connecting to stream...", "var(--primary)", true);

            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(videoId); // This plays the song directly!
            } else {
                showToast("YouTube Player is still loading... wait a second.", true);
            }
        }

        function updatePlayerStatus(text, color, isLoading) {
            pStatus.innerText = text;
            pStatus.style.color = color;
            playPauseBtn.className = isLoading ? 'fas fa-circle-notch fa-spin btn-play' : 'fas fa-pause-circle btn-play';
        }

        function togglePlay() {
            if (!ytPlayer || !ytPlayer.getPlayerState) return;
            const state = ytPlayer.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        }

        // Custom Progress Bar Updates
        function startProgressBar() {
            clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (ytPlayer && ytPlayer.getCurrentTime) {
                    const current = ytPlayer.getCurrentTime();
                    const duration = ytPlayer.getDuration();
                    if (duration > 0) {
                        const percent = (current / duration) * 100;
                        document.getElementById('progFill').style.width = `${percent}%`;
                        document.getElementById('currTime').innerText = formatTime(current);
                        document.getElementById('durTime').innerText = formatTime(duration);
                    }
                }
            }, 500);
        }

        function seek(e) {
            if (!ytPlayer || !ytPlayer.getDuration) return;
            const width = document.getElementById('progBar').clientWidth;
            const duration = ytPlayer.getDuration();
            const seekToTime = (e.offsetX / width) * duration;
            ytPlayer.seekTo(seekToTime, true);
        }

        function setVolume(e) {
            if (!ytPlayer || !ytPlayer.setVolume) return;
            const width = e.currentTarget.clientWidth;
            let vol = e.offsetX / width;
            vol = Math.max(0, Math.min(1, vol)); 
            ytPlayer.setVolume(vol * 100);
            document.getElementById('volFill').style.width = `${vol * 100}%`;
        }

        function formatTime(s) {
            if (isNaN(s) || s < 0) return "0:00";
            const min = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${msg}`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
