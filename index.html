<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Music Pro | V5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1ed760; --bg-black: #000000; --bg-dark: #121212;
            --bg-light: #181818; --text-gray: #b3b3b3; --accent: #282828;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-black); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Layout Container */
        .app-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar - Search */
        .sidebar { width: 320px; background: var(--bg-black); padding: 20px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #222; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); }
        .search-box { position: relative; }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 8px; border:none; background: var(--bg-light); color: white; outline: none; }
        .search-box i { position: absolute; left: 15px; top: 14px; color: var(--text-gray); }

        .search-results { flex: 1; overflow-y: auto; margin-top: 10px; }
        .res-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .res-item:hover { background: var(--accent); }
        .res-item img { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; }
        .res-info .title { font-size: 14px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .res-info .artist { font-size: 12px; color: var(--text-gray); }

        /* Main Content - Player & Lyrics */
        .main-content { flex: 1; background: linear-gradient(to bottom, #222, var(--bg-dark)); padding: 30px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; text-align: center; }
        .now-playing-visual { width: 100%; max-width: 400px; margin-top: 20px; }
        .now-playing-visual img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .song-meta { margin-top: 25px; }
        .song-meta h1 { font-size: 32px; font-weight: 800; }
        .song-meta p { color: var(--text-gray); font-size: 18px; margin-top: 5px; }

        .lyrics-container { margin-top: 40px; width: 100%; max-width: 600px; color: var(--text-gray); font-size: 20px; font-weight: 600; line-height: 1.6; }
        .lyrics-text { white-space: pre-wrap; padding-bottom: 50px; }

        /* Right Sidebar - Queue/Suggestions */
        .queue-sidebar { width: 350px; background: var(--bg-black); padding: 20px; border-left: 1px solid #222; overflow-y: auto; }
        .queue-sidebar h3 { margin-bottom: 20px; font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* Bottom Player Bar */
        .player-bar { height: 100px; background: #000; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; position: relative; z-index: 100; }
        .current-track { display: flex; align-items: center; gap: 15px; width: 30%; }
        .current-track img { width: 56px; height: 56px; border-radius: 4px; }
        
        .center-controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-play { font-size: 40px; color: white; cursor: pointer; }
        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-gray); }
        .progress-bar { flex: 1; height: 4px; background: #4d4d4d; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 2px; }

        .side-controls { width: 30%; display: flex; justify-content: flex-end; gap: 15px; color: var(--text-gray); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="logo">KRISHAN PRO <span style="font-size: 10px; color:white;">v1.1</span></div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search Songs..." onkeypress="if(event.key=='Enter') search()">
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <div class="main-content">
            <div class="now-playing-visual">
                <img id="mainThumb" src="https://via.placeholder.com/400" alt="">
            </div>
            <div class="song-meta">
                <h1 id="mainTitle">Select a song</h1>
                <p id="mainArtist">to start playing</p>
            </div>
            <div class="lyrics-container">
                <h3 style="color:var(--primary); margin-bottom:20px;">LYRICS</h3>
                <div class="lyrics-text" id="lyricsText">Search and play a song to see lyrics...</div>
            </div>
        </div>

        <div class="queue-sidebar">
            <h3>UP NEXT / SUGGESTIONS</h3>
            <div id="queueResults"></div>
        </div>
    </div>

    <div id="ytContainer" style="display:none;"></div>

    <div class="player-bar">
        <div class="current-track">
            <img id="barThumb" src="https://via.placeholder.com/56">
            <div>
                <div id="barTitle" style="font-weight:600; font-size:14px;">Title</div>
                <div id="barArtist" style="font-size:12px; color:var(--text-gray);">Artist</div>
            </div>
        </div>
        <div class="center-controls">
            <div class="btns">
                <i class="fas fa-random" style="margin-right:20px; color:#555;"></i>
                <i class="fas fa-play-circle btn-play" id="playBtn" onclick="togglePlay()"></i>
                <i class="fas fa-redo" style="margin-left:20px; color:#555;"></i>
            </div>
            <div class="progress-container">
                <span id="currTime">0:00</span>
                <div class="progress-bar" onclick="seek(event)">
                    <div class="progress-fill" id="progFill"></div>
                </div>
                <span id="durTime">0:00</span>
            </div>
        </div>
        <div class="side-controls">
            <i class="fas fa-list"></i>
            <i class="fas fa-volume-up"></i>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // UPDATE THIS URL
        const API_URL = "https://ytmusicapi-krishan.onrender.com"; 

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytContainer', {
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        async function search() {
            const q = document.getElementById('searchInput').value;
            const res = await fetch(`${API_URL}/search?query=${q}`);
            const data = await res.json();
            const box = document.getElementById('searchResults');
            box.innerHTML = '';
            data.data.forEach(s => {
                const thumb = s.thumbnails[s.thumbnails.length-1].url;
                box.innerHTML += `
                <div class="res-item" onclick="playSong('${s.videoId}', '${s.title.replace(/'/g,"")}', '${thumb}', '${s.artists[0].name}')">
                    <img src="${thumb}">
                    <div class="res-info"><div class="title">${s.title}</div><div class="artist">${s.artists[0].name}</div></div>
                </div>`;
            });
        }

        async function playSong(id, title, thumb, artist) {
            // Update UI
            document.getElementById('mainTitle').innerText = title;
            document.getElementById('barTitle').innerText = title;
            document.getElementById('mainArtist').innerText = artist;
            document.getElementById('barArtist').innerText = artist;
            document.getElementById('mainThumb').src = thumb;
            document.getElementById('barThumb').src = thumb;
            
            // Play YT
            player.loadVideoById(id);
            document.getElementById('playBtn').className = "fas fa-pause-circle btn-play";

            // Fetch Lyrics
            fetchLyrics(id);
            // Fetch Suggestions (Queue)
            fetchSuggestions(id);
        }

        async function fetchLyrics(id) {
            document.getElementById('lyricsText').innerText = "Fetching lyrics...";
            const res = await fetch(`${API_URL}/lyrics/${id}`);
            const data = await res.json();
            document.getElementById('lyricsText').innerText = data.data || "Lyrics not found for this song.";
        }

        async function fetchSuggestions(id) {
            const box = document.getElementById('queueResults');
            box.innerHTML = '<p style="padding:10px;">Finding similar vibes...</p>';
            const res = await fetch(`${API_URL}/suggestions/${id}`);
            const data = await res.json();
            box.innerHTML = '';
            data.data.forEach(s => {
                const t = s.thumbnail[0].url;
                box.innerHTML += `
                <div class="res-item" onclick="playSong('${s.videoId}', '${s.title.replace(/'/g,"")}', '${t}', '${s.artists[0].name}')">
                    <img src="${t}">
                    <div class="res-info"><div class="title">${s.title}</div><div class="artist">${s.artists[0].name}</div></div>
                </div>`;
            });
        }

        function togglePlay() {
            const state = player.getPlayerState();
            if(state == 1) { player.pauseVideo(); document.getElementById('playBtn').className = "fas fa-play-circle btn-play"; }
            else { player.playVideo(); document.getElementById('playBtn').className = "fas fa-pause-circle btn-play"; }
        }

        function onPlayerStateChange(e) {
            if(e.data == 1) setInterval(updateProgress, 500);
        }

        function updateProgress() {
            const curr = player.getCurrentTime();
            const dur = player.getDuration();
            if(dur > 0) {
                const per = (curr / dur) * 100;
                document.getElementById('progFill').style.width = per + "%";
                document.getElementById('currTime').innerText = formatTime(curr);
                document.getElementById('durTime').innerText = formatTime(dur);
            }
        }

        function formatTime(s) {
            const m = Math.floor(s/60);
            const r = Math.floor(s%60);
            return `${m}:${r < 10 ? '0' : ''}${r}`;
        }

        function seek(e) {
            const bar = e.currentTarget;
            const per = e.offsetX / bar.clientWidth;
            player.seekTo(per * player.getDuration());
        }
    </script>
</body>
</html>
