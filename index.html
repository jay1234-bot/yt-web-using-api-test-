<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Music | Fixed Infinity</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1ed760; --bg-main: #050505; --bg-card: #121212;
            --text-main: #ffffff; --text-dim: #b3b3b3;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-main); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Modern Layout */
        .app-shell { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: #000; padding: 20px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); }
        .search-box { position: relative; }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 25px; border:none; background: #181818; color: white; outline: none; }
        .search-box i { position: absolute; left: 15px; top: 13px; color: var(--text-dim); }
        .results-list { flex: 1; overflow-y: auto; }

        .song-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-bottom: 5px; }
        .song-item:hover { background: #282828; }
        .song-item img { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; }
        .song-item .t { font-size: 14px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .main-view { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; background: radial-gradient(circle at top, #1ed76011, #050505); }
        .big-art { width: 100%; max-width: 380px; aspect-ratio: 1/1; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 25px; object-fit: cover; }
        .lyrics-box { width: 100%; max-width: 600px; margin-top: 30px; padding: 30px; background: rgba(255,255,255,0.03); border-radius: 20px; text-align: center; }

        /* Bottom Player */
        .player-bar { height: 100px; background: #000; border-top: 1px solid #222; display: flex; align-items: center; padding: 0 25px; justify-content: space-between; position: relative; z-index: 100; }
        .track-info { width: 30%; display: flex; align-items: center; gap: 15px; }
        .track-info img { width: 56px; height: 56px; border-radius: 6px; }
        .controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .play-btn { font-size: 40px; color: white; cursor: pointer; }
        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-dim); }
        .bar { flex: 1; height: 4px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
        .fill { height: 100%; width: 0%; background: var(--primary); border-radius: 2px; }

        @media (max-width: 800px) { .sidebar { display: none; } .track-info { width: 70%; } .controls { width: 30%; } .progress-container { position: absolute; top: 0; left: 0; width: 100%; } }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo"><i class="fas fa-bolt"></i> KRISHAN MUSIC</div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search for a banger..." onkeypress="if(event.key=='Enter') search()">
            </div>
            <div class="results-list" id="results"></div>
        </aside>

        <main class="main-view">
            <img id="mainArt" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=500" class="big-art">
            <h1 id="mainTitle">Vibe Check?</h1>
            <p id="mainArtist" style="color:var(--primary); font-weight:600; margin-top:5px;">Search something bawaal</p>
            
            <div class="lyrics-box">
                <h4 style="color:var(--text-dim); margin-bottom:15px; letter-spacing:2px;">LYRICS PANEL</h4>
                <div id="lyricsContent" style="font-size:20px; font-weight:700; line-height:1.6;">Play a song to see magic...</div>
            </div>
        </main>
    </div>

    <div id="ytContainer" style="display:none;"></div>

    <footer class="player-bar">
        <div class="track-info">
            <img id="miniThumb" src="https://via.placeholder.com/56">
            <div style="overflow:hidden">
                <div id="miniTitle" style="font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Song Title</div>
                <div id="miniArtist" style="font-size:12px; color:var(--text-dim);">Artist</div>
            </div>
        </div>

        <div class="controls">
            <div class="btns" style="display:flex; align-items:center; gap:25px;">
                <i class="fas fa-step-backward" style="color:#777; cursor:pointer;" onclick="playPrev()"></i>
                <i class="fas fa-play-circle play-btn" id="playBtn" onclick="togglePlay()"></i>
                <i class="fas fa-step-forward" style="color:#777; cursor:pointer;" onclick="playNext()"></i>
            </div>
            <div class="progress-container">
                <span id="currTime">0:00</span>
                <div class="bar" onclick="seek(event)"><div class="fill" id="fill"></div></div>
                <span id="durTime">0:00</span>
            </div>
        </div>
        <div style="width:30%"></div>
    </footer>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // 1. APNA RENDER URL YAHAN DALEIN
        const API_URL = "https://ytmusicapi-krishan.onrender.com"; 

        let player;
        let isPlayerReady = false;
        let queue = [];
        let currentIndex = 0;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytContainer', {
                events: {
                    'onReady': () => { isPlayerReady = true; console.log("YT Ready"); },
                    'onStateChange': onStateChange,
                    'onError': () => playNext() // Agar gaana block ho toh agla bajao
                }
            });
        }

        async function search() {
            const q = document.getElementById('searchInput').value;
            if(!q) return;
            try {
                const res = await fetch(`${API_URL}/search?query=${encodeURIComponent(q)}`);
                const data = await res.json();
                const box = document.getElementById('results');
                box.innerHTML = '';
                queue = data.data; // Store in queue

                data.data.forEach((s, index) => {
                    const thumb = s.thumbnails[s.thumbnails.length-1].url.replace('w60-h60', 'w500-h500');
                    // Special character fix: use index instead of passing title strings
                    box.innerHTML += `
                        <div class="song-item" onclick="preparePlay(${index})">
                            <img src="${thumb}">
                            <div class="meta"><span class="t">${s.title}</span><span style="font-size:12px;color:#777">${s.artists[0].name}</span></div>
                        </div>`;
                });
            } catch(e) { console.error("Search failed", e); }
        }

        function preparePlay(index) {
            currentIndex = index;
            const song = queue[currentIndex];
            const thumb = song.thumbnails[song.thumbnails.length-1].url.replace('w60-h60', 'w500-h500');
            playSong(song.videoId, song.title, thumb, song.artists[0].name);
        }

        function playSong(id, title, thumb, artist) {
            if(!isPlayerReady) { console.log("Player not ready yet"); return; }

            // UI Updates
            document.getElementById('mainTitle').innerText = title;
            document.getElementById('miniTitle').innerText = title;
            document.getElementById('mainArtist').innerText = artist;
            document.getElementById('miniArtist').innerText = artist;
            document.getElementById('mainArt').src = thumb;
            document.getElementById('miniThumb').src = thumb;

            // YouTube Play
            player.loadVideoById(id);
            document.getElementById('playBtn').className = "fas fa-pause-circle play-btn";

            // Fetch Data
            fetchLyrics(id);
            fetchSuggestions(id);
        }

        async function fetchLyrics(id) {
            const box = document.getElementById('lyricsContent');
            box.innerText = "Finding words...";
            const res = await fetch(`${API_URL}/lyrics/${id}`);
            const data = await res.json();
            box.innerText = data.data || "Lyrics not found, just feel the vibe!";
        }

        async function fetchSuggestions(id) {
            // Hum queue ko update kar sakte hain similar songs se
            const res = await fetch(`${API_URL}/suggestions/${id}`);
            const data = await res.json();
            if(data.status === 'success') {
                // Suggestions ko queue ke aage jod do
                queue = [...queue, ...data.data];
            }
        }

        function playNext() { if(currentIndex < queue.length - 1) preparePlay(currentIndex + 1); }
        function playPrev() { if(currentIndex > 0) preparePlay(currentIndex - 1); }

        function onStateChange(e) {
            if(e.data == YT.PlayerState.PLAYING) setInterval(updateProgress, 500);
            if(e.data == YT.PlayerState.ENDED) playNext();
        }

        function updateProgress() {
            if(!player || !player.getCurrentTime) return;
            const cur = player.getCurrentTime();
            const dur = player.getDuration();
            if(dur > 0) {
                const per = (cur / dur) * 100;
                document.getElementById('fill').style.width = per + "%";
                document.getElementById('currTime').innerText = format(cur);
                document.getElementById('durTime').innerText = format(dur);
            }
        }

        function togglePlay() {
            const s = player.getPlayerState();
            if(s == 1) { player.pauseVideo(); document.getElementById('playBtn').className = "fas fa-play-circle play-btn"; }
            else { player.playVideo(); document.getElementById('playBtn').className = "fas fa-pause-circle play-btn"; }
        }

        function seek(e) {
            const bar = e.currentTarget;
            const per = e.offsetX / bar.clientWidth;
            player.seekTo(per * player.getDuration());
        }

        function format(s) {
            const m = Math.floor(s/60);
            const r = Math.floor(s%60);
            return `${m}:${r < 10 ? '0' : ''}${r}`;
        }
    </script>
</body>
</html>
